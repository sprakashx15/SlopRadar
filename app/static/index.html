<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlopRadar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header>
            <h1>Slop<span class="accent">Radar</span></h1>
            <p>Paste any text below to instantly analyze if it was written by a human or generated by an AI model.</p>
        </header>

        <main>
            <div class="input-section glass-panel">
                <textarea id="text-input" placeholder="Enter text here... (minimum 20 words recommended)"></textarea>
                <div class="controls">
                    <span id="char-count">0 characters</span>
                    <button id="analyze-btn" disabled>Analyze Text</button>
                </div>
            </div>

            <div id="loading-state" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing linguistic patterns...</p>
            </div>

            <div id="results-panel" class="results-panel glass-panel hidden">
                <div class="result-header">
                    <h2 id="prediction-title">Human Written</h2>
                    <div id="confidence-badge" class="confidence-badge">99.9% Confidence</div>
                </div>
                
                <div class="progress-container">
                    <div class="labels">
                        <span>Human</span>
                        <span>AI Generated</span>
                    </div>
                    <div class="progress-track">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
